name: Advanced CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing
        env:
          PYTHONPATH: .

  trivy-scan:
    needs: [test-matrix]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  bandit-scan:
    needs: [trivy-scan]
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Bandit
        run: pip install bandit
      
      - name: Run Bandit security scan
        run: |
          bandit -r . \
            --severity-level medium \
            --confidence-level high \
            -f json \
            -o bandit-report.json || true
          cat bandit-report.json || echo "No Bandit report generated"
  
  security-scan:
    needs: [bandit-scan]
    runs-on: ubuntu-latest

    steps:
      - name: Security approval gate
        run: |
          echo "✅ Все проверки безопасности пройдены."
          echo "Версия: ${{ github.sha }}"
  
  build:
    needs: [bandit-scan]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Build package
        run: |
          echo "Building package..."
          mkdir -p dist
          tar -czf dist/package.tar.gz .
          echo "version: ${{ github.sha }}" > dist/metadata.txt
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-package
          path: dist/
  
  deploy-staging:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-package
          path: dist/

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "🚀 Deploying version: $(cat dist/metadata.txt)"
          echo "✅ Deployed to staging environment!"

  deploy-prod:
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://you-production.com

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-package
          path: dist/
      
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          echo "🚀 Deploying version: $(cat dist/metadata.txt)"
          echo "✅ Deployed to production environment!"